<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidos por la colaboración</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #7dd3fc;
      --accent-shadow: rgba(56, 189, 248, 0.25);
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --panel-bg: #1e293b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-main);
      background: var(--bg-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .page {
      width: min(100%, 840px);
      margin-bottom: 60px;
    }

    .hero-card {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: clamp(30px, 6vw, 60px);
      border-radius: 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .call-support-btn {
      min-width: 240px;
      border: 0;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      color: #0f172a;
      background: var(--accent);
      box-shadow: 0 10px 25px var(--accent-shadow);
      transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .call-support-btn:hover:not(:disabled),
    .call-support-btn:focus-visible:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 15px 30px var(--accent-shadow);
    }

    .call-support-btn:disabled {
      cursor: not-allowed;
      opacity: 0.4;
      box-shadow: none;
      background: #475569;
      color: #94a3b8;
    }

    /* --- VIDEO TILES MODERNOS --- */
    .video-panel {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .video-box {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: #090d16;
      border: 1px solid var(--card-border);
    }

    .video-box label {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 6px 12px;
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
    }

    .video-box video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    @media (max-width: 640px) {
      .video-panel {
        grid-template-columns: 1fr;
      }
    }

    /* --- CONTENEDOR DE IMAGEN WEBEX CALLING --- */
    .webex-branding-container {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .webex-modern-media {
      max-width: 100%;
      width: 320px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 24px rgba(56, 189, 248, 0.18)) brightness(1.05);
      transition: transform 300ms ease;
    }

    .webex-modern-media:hover {
      transform: scale(1.03);
    }

    /* --- WIDGET FLOTANTE: ESTADO EN INFERIOR DERECHA --- */
    .status-panel {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 280px;
      padding: 16px;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
      z-index: 100;
    }

    .status-title {
      margin: 0 0 12px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .status-grid {
      display: grid;
      gap: 8px;
    }

    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .status-value {
      font-weight: 600;
      font-size: 0.8rem;
    }

    .status-item::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      margin-right: 8px;
      display: inline-block;
    }

    .status-item[data-state='working']::before { background: var(--warning); }
    .status-item[data-state='ok']::before { background: var(--success); }
    .status-item[data-state='error']::before { background: var(--danger); }

    .status-message {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--card-border);
      color: var(--text-main);
      font-size: 0.78rem;
      line-height: 1.3;
    }

    /* --- LLAMADA ENTRANTE --- */
    .incoming-call-notification {
      position: fixed;
      left: 24px;
      bottom: 24px;
      width: min(92vw, 360px);
      padding: 16px;
      border-radius: 16px;
      background: #1e293b;
      border: 1px solid var(--card-border);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      transform: translateY(24px);
      opacity: 0;
      pointer-events: none;
      transition: all 220ms ease;
      z-index: 1000;
    }

    .incoming-call-notification.show-notification {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .notifier-a {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .call-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #0f172a;
      background: var(--accent);
    }

    .call-info {
      flex-grow: 1;
    }

    .callee-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .timer {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .cut-call-btn {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      color: #ffffff;
      background: var(--danger);
      font-size: 1.2rem;
      display: grid;
      place-items: center;
    }

    .dropbtn { display: none; }
  </style>
</head>
<body>
  <main class="page" id="body">
    <section class="hero-card" aria-label="Webex Click to Call">
      <h1>Unidos por la colaboración</h1>
      
      <button id="clickToCallBtn" class="call-support-btn" type="button" onclick="initiateCall()" disabled>Click to Call</button>

      <div class="video-panel" aria-label="Video de la llamada">
        <div class="video-box">
          <label for="local-video">Video local</label>
          <video id="local-video" autoplay muted playsinline></video>
        </div>
        <div class="video-box">
          <label for="remote-video">Video remoto</label>
          <video id="remote-video" autoplay playsinline></video>
        </div>
      </div>

      <div class="webex-branding-container">
        <img src="https://gve.cisco.com/content/dam/gve/assets/tech/collaboration/webex-calling-logo.png" alt="Cisco Webex Calling" class="webex-modern-media">
      </div>
      
    </section>
  </main>

  <div class="status-panel" aria-live="polite">
    <p class="status-title">Webex Calling Status</p>
    <div class="status-grid">
      <div class="status-item" id="configStatusItem" data-state="pending">
        <span>Configuración</span>
        <span class="status-value" id="configStatusValue">Pendiente</span>
      </div>
      <div class="status-item" id="authStatusItem" data-state="pending">
        <span>Autenticación</span>
        <span class="status-value" id="authStatusValue">Pendiente</span>
      </div>
      <div class="status-item" id="lineStatusItem" data-state="pending">
        <span>Línea</span>
        <span class="status-value" id="lineStatusValue">Pendiente</span>
      </div>
    </div>
    <div id="clickToCallStatus" class="status-message">Validando...</div>
  </div>

  <div class="incoming-call-notification timestate" id="callNotification" aria-live="polite">
    <div class="notifier-a">
      <div class="call-avatar">W</div>
      <div class="call-info">
        <div class="callee-name">Webex Calling</div>
        <div class="timer"><span id="timer">00:00</span></div>
      </div>
      <button class="cut-call-btn" type="button" aria-label="Finalizar llamada" onclick="disconnectCall()">×</button>
    </div>
  </div>

  <audio id="local-audio" muted autoplay playsinline></audio>
  <audio id="customer-remote-audio" autoplay playsinline></audio>

  <script src="https://unpkg.com/webex/umd/webex.min.js"></script>
  <script src="https://unpkg.com/webex@3.5.0-next.25/umd/calling.min.js"></script>
  <script src="./js/app.js"></script>
  <script src="./sdk/calling-sdk.js"></script>
  <script>
    window.addEventListener('load', function () {
      if (typeof prepareClickToCall === 'function') { prepareClickToCall(); }
      if (typeof initCalling === 'function') { initCalling('customer'); }
    });
  </script>
</body>
</html>
